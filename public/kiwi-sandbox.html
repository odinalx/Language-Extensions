<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Kiwi analyzer (sandboxed)</title>
  </head>
  <body>
    <!--
      Static, self-contained sandbox page (NOT a WXT entrypoint, so no dev-server
      HMR injection). kiwi-sandbox.js is pre-bundled by scripts/bundle-sandbox.mjs
      and served from the extension origin ('self') in both dev and production.
      Runs Kiwi (Emscripten/Embind needs 'unsafe-eval', allowed only here via the
      sandbox CSP). The offscreen document embeds this as a hidden iframe and
      bridges segment requests over postMessage.
    -->
    <script type="module" src="./kiwi-sandbox.js"></script>
  </body>
</html>
